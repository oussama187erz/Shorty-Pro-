<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🔥 Google AdSense (ضروري يكون فـ head) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4918559872472133"
    crossorigin="anonymous"></script>

    <title>Shorty Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');

        :root {
            --accent: #FF6B4A;
            --warm-white: #F0EBE5;
            --warm-gray: #7A756F;
            --warm-dark: #1A1714;
            --border: rgba(255, 235, 220, 0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--warm-dark);
            color: var(--warm-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
        }

        .field-input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
            color: white;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .result {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255,107,74,0.1);
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Shorty Pro 🔗</h2>
    <p>Paste your link</p>

    <input type="text" id="url" class="field-input" placeholder="https://example.com">

    <button class="btn" onclick="shorten()">Generate</button>

    <div id="result" class="result" style="display:none;">
        <a id="shortLink" target="_blank"></a>
    </div>

</div>

<script>
async function shorten() {
    let url = document.getElementById("url").value;
    let result = document.getElementById("result");
    let link = document.getElementById("shortLink");

    if (!url.startsWith("http")) {
        alert("Enter valid URL");
        return;
    }

    let response = await fetch("https://tinyurl.com/api-create.php?url=" + encodeURIComponent(url));
    let data = await response.text();

    link.href = data;
    link.innerText = data;
    result.style.display = "block";
}
</script>

</body>
</html>
