<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorty Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');
        
        :root {
            --accent: #FF6B4A;
            --accent-soft: rgba(255, 107, 74, 0.12);
            --accent-glow: rgba(255, 107, 74, 0.25);
            --warm-white: #F0EBE5;
            --warm-gray: #7A756F;
            --warm-dark: #1A1714;
            --border: rgba(255, 235, 220, 0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--warm-dark);
            color: var(--warm-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
        }

        /* --- Atmosphère d'arrière-plan --- */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
            animation: floatBlob 12s ease-in-out infinite alternate;
            opacity: 0.4;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,176,136,0.15) 0%, transparent 70%);
            pointer-events: none;
            animation: floatBlob 15s ease-in-out infinite alternate-reverse;
            opacity: 0.3;
        }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        /* --- Grain overlay --- */
        .grain {
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 999;
        }

        /* --- Carte principale --- */
        .card {
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid var(--border);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
        }

        /* --- Inputs --- */
        .field-input {
            width: 100%;
            background: rgba(0,0,0,0.35);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.1rem;
            font-size: 0.875rem;
            color: var(--warm-white);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }
        .field-input::placeholder { color: #4A4540; }
        .field-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft), 0 0 20px var(--accent-glow);
        }

        /* --- Bouton principal --- */
        .btn-main {
            width: 100%;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            padding: 1rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .btn-main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-main:hover { transform: translateY(-1px); box-shadow: 0 8px 30px var(--accent-glow); }
        .btn-main:hover::before { opacity: 1; }
        .btn-main:active { transform: translateY(0); }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        /* --- Sélecteur de langue --- */
        .lang-switcher {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            display: flex;
            gap: 0.25rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.3rem;
        }
        .lang-btn {
            padding: 0.4rem 0.7rem;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: var(--warm-gray);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            letter-spacing: 0.03em;
        }
        .lang-btn:hover { color: var(--warm-white); }
        .lang-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        /* --- Résultat --- */
        .result-box {
            background: var(--accent-soft);
            border: 1px solid rgba(255,107,74,0.18);
            border-radius: 18px;
            padding: 1.4rem;
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Toast d'erreur --- */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #2D1A15;
            border: 1px solid rgba(255,80,50,0.3);
            color: #FFAA90;
            padding: 0.85rem 1.4rem;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* --- Label --- */
        .field-label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--warm-gray);
            margin-bottom: 0.55rem;
            margin-left: 0.2rem;
            font-weight: 500;
        }

        /* --- Lien résultat --- */
        .result-link {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--warm-white);
            text-decoration: none;
            text-underline-offset: 4px;
            transition: color 0.2s;
            word-break: break-all;
        }
        .result-link:hover { color: var(--accent); }

        .copy-btn {
            background: none;
            border: none;
            padding: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            color: var(--accent);
            transition: background 0.2s;
            font-size: 1rem;
        }
        .copy-btn:hover { background: rgba(255,107,74,0.12); }

        /* RTL adjustments */
        [dir="rtl"] .field-label { margin-left: 0; margin-right: 0.2rem; }
        [dir="rtl"] .lang-switcher { right: auto; left: 1.5rem; }

        /* Ligne décorative */
        .deco-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 0.5rem 0;
        }

        /* Compteur en bas */
        .footer-stat {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #3D3833;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .footer-stat .dot {
            width: 5px; height: 5px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <!-- Sélecteur de langues -->
    <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="ar">AR</button>
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="tr">TR</button>
    </div>

    <!-- Carte principale -->
    <div class="w-full max-w-md">
        <div class="card p-8 md:p-10 space-y-7">

            <!-- En-tête -->
            <header class="space-y-1.5 relative">
                <div class="flex items-center gap-2.5">
                    <div style="width:32px;height:32px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;">
                        <i class="fa-solid fa-link text-white text-xs"></i>
                    </div>
                    <h1 class="text-2xl font-extrabold tracking-tight" data-i18n="title">Shorty <span style="color:var(--accent)">Pro.</span></h1>
                </div>
                <p class="text-sm" style="color:var(--warm-gray)" data-i18n="subtitle">Fast links, zero clutter</p>
            </header>

            <div class="deco-line"></div>

            <!-- Champs -->
            <div class="space-y-5">
                <div>
                    <label class="field-label" data-i18n="label_url">Original Link</label>
                    <input type="url" id="longUrl" data-placeholder="placeholder_url" placeholder="https://example.com/your-long-url" class="field-input">
                </div>

                <div>
                    <label class="field-label" data-i18n="label_alias">Custom Name</label>
                    <div class="flex items-center field-input" style="padding:0;">
                        <span id="domainPart" style="color:#3D3833;font-size:0.8rem;padding-left:1rem;white-space:nowrap;font-weight:500;"></span>
                        <input type="text" id="customAlias" data-placeholder="placeholder_alias" placeholder="my-link" style="flex:1;background:transparent;border:none;padding:1rem 1rem 1rem 0.3rem;color:var(--warm-white);outline:none;font-size:0.875rem;font-family:inherit;">
                    </div>
                </div>

                <button onclick="handleShortening()" id="mainBtn" class="btn-main">
                    <span data-i18n="btn_generate">GENERATE LINK</span>
                    <i class="fa-solid fa-arrow-right text-xs" style="transition:transform 0.2s"></i>
                </button>
            </div>

            <!-- Résultat -->
            <div id="resultBox" class="hidden">
                <div class="result-box space-y-3">
                    <p style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);font-weight:700;" data-i18n="result_label">Your short link</p>
                    <div class="flex items-center gap-2">
                        <a href="#" id="finalLink" target="_blank" class="result-link flex-1 truncate"></a>
                        <button onclick="copyToClipboard()" class="copy-btn">
                            <i id="copyIcon" class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer subtil -->
            <div class="flex items-center justify-between pt-1">
                <div class="footer-stat">
                    <span class="dot"></span>
                    <span data-i18n="footer_status">System online</span>
                </div>
                <span style="color:#2D2924;font-size:0.65rem;font-weight:500;">v2.4</span>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="toastMsg"></span>
    </div>

    <script>
        // ========== Traductions ==========
        const translations = {
            en: {
                title: 'Shorty <span style="color:var(--accent)">Pro.</span>',
                subtitle: 'Fast links, zero clutter',
                label_url: 'Original Link',
                label_alias: 'Custom Name',
                placeholder_url: 'https://example.com/your-long-url',
                placeholder_alias: 'my-link',
                btn_generate: 'GENERATE LINK',
                result_label: 'Your short link',
                footer_status: 'System online',
                error_empty: 'Please enter a valid URL starting with http',
                error_api: 'Alias taken or invalid URL — try another',
                btn_loading: 'PROCESSING...',
                copied: 'Copied!'
            },
            fr: {
                title: 'Shorty <span style="color:var(--accent)">Pro.</span>',
                subtitle: 'Des liens rapides, sans bazar',
                label_url: 'Lien original',
                label_alias: 'Nom personnalisé',
                placeholder_url: 'https://exemple.com/votre-long-url',
                placeholder_alias: 'mon-lien',
                btn_generate: 'GÉNÉRER LE LIEN',
                result_label: 'Votre lien court',
                footer_status: 'Système en ligne',
                error_empty: 'Entrez une URL valide (commençant par http)',
                error_api: 'Alias déjà pris ou URL invalide — essayez un autre',
                btn_loading: 'TRAITEMENT...',
                copied: 'Copié !'
            },
            ar: {
                title: 'شورتي <span style="color:var(--accent)">برو.</span>',
                subtitle: 'روابط سريعة، بلا فوضى',
                label_url: 'الرابط الأصلي',
                label_alias: 'اسم مخصص',
                placeholder_url: 'https://example.com/رابطك-الطويل',
                placeholder_alias: 'رابطي',
                btn_generate: 'توليد الرابط',
                result_label: 'رابطك القصير',
                footer_status: 'النظام متصل',
                error_empty: 'أدخل رابطاً صحيحاً يبدأ بـ http',
                error_api: 'الاسم مستخدم أو الرابط غير صالح — جرّب غيره',
                btn_loading: 'جارٍ المعالجة...',
                copied: 'تم النسخ!'
            },
            es: {
                title: 'Shorty <span style="color:var(--accent)">Pro.</span>',
                subtitle: 'Enlaces rápidos, sin desorden',
                label_url: 'Enlace original',
                label_alias: 'Nombre personalizado',
                placeholder_url: 'https://ejemplo.com/tu-url-larga',
                placeholder_alias: 'mi-enlace',
                btn_generate: 'GENERAR ENLACE',
                result_label: 'Tu enlace corto',
                footer_status: 'Sistema en línea',
                error_empty: 'Ingresa una URL válida que empiece con http',
                error_api: 'Alias en uso o URL inválida — prueba otro',
                btn_loading: 'PROCESANDO...',
                copied: '¡Copiado!'
            },
            tr: {
                title: 'Shorty <span style="color:var(--accent)">Pro.</span>',
                subtitle: 'Hızlı linkler, sıfır karmaşa',
                label_url: 'Orijinal Link',
                label_alias: 'Özel İsim',
                placeholder_url: 'https://ornek.com/uzun-linkiniz',
                placeholder_alias: 'linkim',
                btn_generate: 'LİNK OLUŞTUR',
                result_label: 'Kısa linkiniz',
                footer_status: 'Sistem çevrimiçi',
                error_empty: 'Lütfen http ile başlayan geçerli bir URL girin',
                error_api: 'Alias kullanımda veya geçersiz URL — başka deneyin',
                btn_loading: 'İŞLENİYOR...',
                copied: 'Kopyalandı!'
            }
        };

        let currentLang = 'en';

        // ========== Changement de langue ==========
        function setLang(lang) {
            currentLang = lang;
            const t = translations[lang];
            const isRtl = lang === 'ar';

            document.documentElement.lang = lang;
            document.documentElement.dir = isRtl ? 'rtl' : 'ltr';

            // Mettre à jour tous les éléments traduits
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerHTML = t[key];
            });

            // Mettre à jour les placeholders
            document.querySelectorAll('[data-placeholder]').forEach(el => {
                const key = el.getAttribute('data-placeholder');
                if (t[key]) el.placeholder = t[key];
            });

            // Mettre à jour les boutons de langue
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        // Écouteurs pour les boutons de langue
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLang(btn.dataset.lang));
        });

        // ========== Domaine auto ==========
        document.getElementById('domainPart').innerText = window.location.host + '/';

        // ========== Toast d'erreur ==========
        let toastTimeout;
        function showError(msg) {
            const t = translations[currentLang];
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ========== Logique principale ==========
        async function handleShortening() {
            const t = translations[currentLang];
            const longUrl = document.getElementById('longUrl').value.trim();
            const alias = document.getElementById('customAlias').value.trim();
            const btn = document.getElementById('mainBtn');
            const resultBox = document.getElementById('resultBox');

            if (!longUrl || !longUrl.startsWith('http')) {
                showError(t.error_empty);
                return;
            }

            // État de chargement
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> ' + t.btn_loading;
            btn.disabled = true;
            resultBox.classList.add('hidden');

            try {
                const apiUrl = `https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}${alias ? '&alias=' + encodeURIComponent(alias) : ''}`;
                const response = await fetch(apiUrl);
                const data = await response.text();

                if (data === 'Error' || !response.ok) {
                    throw new Error(t.error_api);
                }

                document.getElementById('finalLink').innerText = data;
                document.getElementById('finalLink').href = data;
                resultBox.classList.remove('hidden');

            } catch (err) {
                showError(err.message || t.error_api);
            } finally {
                btn.innerHTML = `<span data-i18n="btn_generate">${t.btn_generate}</span><i class="fa-solid fa-arrow-right text-xs"></i>`;
                btn.disabled = false;
            }
        }

        // ========== Copier ==========
        function copyToClipboard() {
            const text = document.getElementById('finalLink').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const icon = document.getElementById('copyIcon');
                icon.className = 'fa-solid fa-check';
                icon.style.color = '#4ADE80';
                setTimeout(() => {
                    icon.className = 'fa-regular fa-copy';
                    icon.style.color = 'var(--accent)';
                }, 2000);
            });
        }

        // ========== Hover flèche ==========
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.addEventListener('mouseenter', () => {
            const arrow = mainBtn.querySelector('.fa-arrow-right');
            if (arrow) arrow.style.transform = 'translateX(3px)';
        });
        mainBtn.addEventListener('mouseleave', () => {
            const arrow = mainBtn.querySelector('.fa-arrow-right');
            if (arrow) arrow.style.transform = 'translateX(0)';
        });

        // ========== Entrée avec Enter ==========
        document.getElementById('longUrl').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleShortening();
        });
        document.getElementById('customAlias').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleShortening();
        });
    </script>
</body>
</html>
